name: Validate kit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * 1"

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse JSON files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.json | ForEach-Object {
            Write-Host "Parsing $($_.FullName)"
            Get-Content -Raw -LiteralPath $_.FullName | ConvertFrom-Json | Out-Null
          }

      - name: Parse PowerShell
        shell: pwsh
        run: |
          Get-ChildItem .\scripts -Recurse -Filter *.ps1 | ForEach-Object {
            Write-Host "Parsing $($_.FullName)"
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

      - name: Enforce JSON schemas
        shell: pwsh
        run: |
          npx --yes ajv-cli@5.0.0 validate --spec=draft2020 -s .\schemas\mcp-catalog.schema.json -d .\config\mcp-catalog.json
          npx --yes ajv-cli@5.0.0 validate --spec=draft2020 -s .\schemas\tool-selection.schema.json -d .\config\tool-selection.example.json
          npx --yes ajv-cli@5.0.0 validate --spec=draft2020 -s .\schemas\tool-profiles.schema.json -d .\config\tool-profiles.json
          npx --yes ajv-cli@5.0.0 validate --spec=draft2020 -s .\schemas\client-capabilities.schema.json -d .\config\client-capabilities.json
          npx --yes ajv-cli@5.0.0 compile --spec=draft2020 -s .\schemas\onboarding-state.schema.json
          npx --yes ajv-cli@5.0.0 compile --spec=draft2020 -s .\schemas\mcp-version-lock.schema.json

      - name: Run kit validation
        shell: pwsh
        run: |
          .\scripts\WebAnalystSetup.ps1 -Action Validate

      - name: Run fixture tests
        shell: pwsh
        run: |
          .\scripts\WebAnalystSetup.ps1 -Action TestFixtures

      - name: Run Pester tests
        shell: pwsh
        run: |
          .\scripts\WebAnalystSetup.ps1 -Action PesterTests

      - name: Validate with Windows PowerShell 5.1
        shell: powershell
        run: |
          .\scripts\WebAnalystSetup.ps1 -Action Validate
          .\scripts\WebAnalystSetup.ps1 -Action PesterTests

      - name: Check all catalog providers on schedule
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: powershell
        run: |
          .\scripts\WebAnalystSetup.ps1 -Action CheckMcpUpdates -AllCatalogProviders

      - name: Run catalog review
        shell: pwsh
        run: |
          .\scripts\WebAnalystSetup.ps1 -Action CatalogReview

      - name: Run release audit
        shell: pwsh
        run: |
          .\scripts\WebAnalystSetup.ps1 -Action ReleaseAudit

      - name: Check ignored local files are not tracked
        shell: pwsh
        run: |
          $forbidden = @(
            "secrets/.env.local",
            "config/tool-selection.json",
            "generated/mcp.json",
            "generated/codex.config-snippet.toml",
            "generated/onboarding-report.md",
            "generated/onboarding-state.json",
            "generated/mcp-version-lock.json",
            "generated/first-day-checklist.md",
            "generated/credential-guide.md",
            "generated/bigquery-safety-plan.md",
            "generated/mcp-update-check.md",
            "generated/catalog-review.md",
            "generated/fixture-test-report.md",
            "generated/release-audit.md",
            ".mcp.json",
            ".codex/config.toml",
            ".gemini/settings.json",
            ".web-analyst-installation-id"
          )
          $tracked = git ls-files
          $violations = $forbidden | Where-Object { $tracked -contains $_ }
          $violations += $tracked | Where-Object { $_ -like "*.web-analyst-backup-*" }
          if ($violations.Count -gt 0) {
            Write-Error ("Forbidden local files are tracked: " + ($violations -join ", "))
            exit 1
          }
